<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Alejandro — Recipe Portfolio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');

  :root {
    --cream: #fdf6ec; --dark: #1a1008; --brown: #4a2c0a; --gold: #c8922a;
    --light-gold: #f0d08a; --red: #8b1a1a; --gray: #6b6b6b; --card-bg: #fffdf8; --border: #e8d5b0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }

  /* HEADER */
  header { background: var(--brown); color: var(--cream); padding: 2rem 1rem; text-align: center; border-bottom: 4px solid var(--gold); }
  header h1 span { color: var(--light-gold); font-style: italic; }

  /* NAVIGATION & STATS */
  .stats { display: flex; justify-content: center; gap: 2rem; padding: 0.8rem; background: var(--dark); color: var(--light-gold); font-size: 0.8rem; }
  .search-bar { padding: 1.2rem; background: var(--card-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .search-row { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
  input, select, textarea { padding: 0.6rem; border: 1.5px solid var(--border); border-radius: 6px; font-family: inherit; }

  .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.85rem; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--gray); }

  /* FORM */
  .add-form { background: white; border: 1.5px solid var(--border); border-radius: 10px; padding: 1.2rem; margin: 1rem auto; max-width: 800px; display: none; }
  .add-form.visible { display: block; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.8rem; margin-bottom: 1rem; }
  .form-field { display: flex; flex-direction: column; }
  .form-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--gray); margin-bottom: 0.3rem; }

  /* GRID */
  .container { padding: 1rem; max-width: 1200px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
  .card { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; overflow: hidden; transition: 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  .card-header { background: var(--brown); color: var(--cream); padding: 1rem; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 2rem 1rem; overflow-y: auto; }
  .modal-overlay.visible { display: flex; justify-content: center; }
  .modal { background: white; border-radius: 12px; max-width: 800px; width: 100%; margin: auto; position: relative; }
  .modal-header { background: var(--brown); color: white; padding: 1.5rem; border-radius: 12px 12px 0 0; }
  .modal-body { padding: 2rem; }
  .modal-section { margin-bottom: 1.5rem; }
  .modal-section h4 { font-family: 'Playfair Display', serif; color: var(--brown); border-bottom: 2px solid var(--gold); margin-bottom: 0.8rem; padding-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 1px; }
  .notes-box { background: #fffbe6; border-left: 4px solid var(--gold); padding: 1rem; font-style: italic; white-space: pre-wrap; }
  .cuisine-badge { background: var(--gold); color: white; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }

  /* PRINT LOGIC - THE CRITICAL FIX */
  @media print {
    @page { margin: 1cm; }
    body * { visibility: hidden; background: white !important; color: black !important; }
    .modal-overlay, .modal-overlay * { visibility: visible; }
    .modal-overlay { position: absolute; left: 0; top: 0; width: 100%; display: block !important; background: white !important; padding: 0; }
    .modal { border: none; width: 100%; max-width: 100%; position: absolute; top: 0; left: 0; box-shadow: none; }
    .modal-header { background: #000 !important; color: #fff !important; padding: 1rem; -webkit-print-color-adjust: exact; }
    .modal-actions, .btn, .close-btn { display: none !important; }
    .modal-section h4 { border-bottom: 2px solid #000 !important; color: #000 !important; }
    ul, ol { padding-left: 1.5rem; }
    .notes-box { border: 1px solid #ddd !important; background: #fff !important; color: #333 !important; }
  }
</style>
</head>
<body>

<header>
  <h1>Chef <span>Alejandro</span> — Culinary Archive</h1>
  <p>Technical Legacy | Royal Caribbean · Omni Grove Park · Guatemala</p>
</header>

<div class="stats">
  <span>📚 <strong id="totalCount">0</strong> Recipes</span>
  <span>🌍 <strong id="cuisineCount">0</strong> Cuisines</span>
</div>

<div class="search-bar">
  <div class="search-row">
    <input type="text" id="searchName" placeholder="Search dish..." oninput="render()" style="flex: 2;">
    <select id="filterCuisine" onchange="render()"><option value="">All Cuisines</option></select>
    <button class="btn btn-gold" onclick="toggleAddForm()">＋ New Technical Entry</button>
  </div>
  <div class="search-row">
    <button class="btn btn-outline" onclick="exportJSON()">Export Archive</button>
    <button class="btn btn-outline" onclick="importJSON()">Import Archive</button>
    <input type="file" id="importFile" style="display:none" onchange="loadImport(event)">
  </div>
</div>

<div class="add-form" id="addForm">
  <div class="form-grid">
    <div class="form-field"><label class="form-label">Dish Name</label><input type="text" id="f_name"></div>
    <div class="form-field"><label class="form-label">Cuisine Type</label><input type="text" id="f_cuisine"></div>
    <div class="form-field"><label class="form-label">Primary Technique</label><input type="text" id="f_technique"></div>
    <div class="form-field"><label class="form-label">Difficulty</label><select id="f_difficulty"><option>Basic</option><option>Intermediate</option><option>Advanced</option></select></div>
  </div>
  <div class="form-field" style="margin-bottom:1rem;"><label class="form-label">Ingredients (One per line)</label><textarea id="f_ingredients" rows="4"></textarea></div>
  <div class="form-field" style="margin-bottom:1rem;"><label class="form-label">Method / Steps (One per line)</label><textarea id="f_method" rows="4"></textarea></div>
  <div class="form-grid">
    <div class="form-field"><label class="form-label">Alejandro's Personal Notes</label><textarea id="f_personal" rows="3"></textarea></div>
    <div class="form-field"><label class="form-label">Wine/Drink Pairing</label><textarea id="f_pairing" rows="3"></textarea></div>
  </div>
  <div style="display:flex; gap:10px;">
    <button class="btn btn-gold" onclick="saveRecipe()">Commit to Portfolio</button>
    <button class="btn btn-outline" onclick="toggleAddForm()">Cancel</button>
  </div>
</div>

<div class="container"><div class="grid" id="grid"></div></div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="m_name"></h2>
      <div id="m_meta" style="margin-top:5px; font-size:0.9rem; opacity:0.9;"></div>
    </div>
    <div class="modal-body">
      <div class="modal-section" id="sec_ingredients">
        <h4>Ingredients & Mise en place</h4>
        <ul id="m_ingredients"></ul>
      </div>
      <div class="modal-section" id="sec_method">
        <h4>Execution Method</h4>
        <ol id="m_method"></ol>
      </div>
      <div class="modal-section" id="sec_personal">
        <h4>Alejandro's Notes (Legacy Context)</h4>
        <div class="notes-box" id="m_personal"></div>
      </div>
      <div class="modal-section" id="sec_pairing">
        <h4>Pairing Recommendations</h4>
        <p id="m_pairing" style="line-height:1.6;"></p>
      </div>
      <div class="modal-actions" style="display:flex; gap:1rem; margin-top:2rem;">
        <button class="btn btn-gold" style="flex:2" onclick="window.print()">🖨️ Print for Station</button>
        <button class="btn btn-outline" style="flex:1" onclick="closeModalDirect()">Close</button>
        <button id="m_delete" class="btn" style="background:var(--red); color:white;">🗑 Delete</button>
      </div>
    </div>
  </div>
</div>

<script>
let recipes = JSON.parse(localStorage.getItem('chef_archive') || '[]');

function save() {
  localStorage.setItem('chef_archive', JSON.stringify(recipes));
  updateStats();
  buildCuisineFilter();
}

function toggleAddForm() { document.getElementById('addForm').classList.toggle('visible'); }

function saveRecipe() {
  const r = {
    id: Date.now().toString(),
    name: document.getElementById('f_name').value,
    cuisine: document.getElementById('f_cuisine').value,
    technique: document.getElementById('f_technique').value,
    difficulty: document.getElementById('f_difficulty').value,
    ingredients: document.getElementById('f_ingredients').value,
    method: document.getElementById('f_method').value,
    personal: document.getElementById('f_personal').value,
    pairing: document.getElementById('f_pairing').value
  };
  if(!r.name || !r.cuisine) return alert("Chef, please at least name the dish and cuisine.");
  recipes.unshift(r);
  save();
  render();
  toggleAddForm();
  // Clear form
  ['f_name','f_cuisine','f_technique','f_ingredients','f_method','f_personal','f_pairing'].forEach(id => document.getElementById(id).value = '');
}

function openModal(id) {
  const r = recipes.find(x => x.id === id);
  document.getElementById('m_name').textContent = r.name;
  document.getElementById('m_meta').innerHTML = `<span class="cuisine-badge">${r.cuisine}</span> | Technique: ${r.technique || 'Classic'} | Level: ${r.difficulty}`;

  // Mapping text to lists
  document.getElementById('m_ingredients').innerHTML = r.ingredients.split('\n').filter(t => t.trim()).map(i => `<li>${i}</li>`).join('');
  document.getElementById('m_method').innerHTML = r.method.split('\n').filter(t => t.trim()).map(s => `<li>${s}</li>`).join('');

  // Personal Notes Display
  const pSec = document.getElementById('sec_personal');
  if(r.personal) { pSec.style.display = 'block'; document.getElementById('m_personal').textContent = r.personal; }
  else { pSec.style.display = 'none'; }

  // Pairing Display
  const pairSec = document.getElementById('sec_pairing');
  if(r.pairing) { pairSec.style.display = 'block'; document.getElementById('m_pairing').textContent = r.pairing; }
  else { pairSec.style.display = 'none'; }

  document.getElementById('m_delete').onclick = () => { if(confirm("Discard this legacy entry?")) { recipes = recipes.filter(x => x.id !== id); save(); render(); closeModalDirect(); } };
  document.getElementById('modal').classList.add('visible');
}

function closeModal(e) { if(e.target.id === 'modal') closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('visible'); }

function render() {
  const query = document.getElementById('searchName').value.toLowerCase();
  const cui = document.getElementById('filterCuisine').value;
  const filtered = recipes.filter(r => r.name.toLowerCase().includes(query) && (!cui || r.cuisine === cui));
  
  document.getElementById('grid').innerHTML = filtered.map(r => `
    <div class="card" onclick="openModal('${r.id}')">
      <div class="card-header"><strong>${r.name}</strong></div>
      <div style="padding:1rem; font-size:0.8rem; color:var(--gray);">
        <span class="cuisine-badge">${r.cuisine}</span><br><br>
        Main Technique: ${r.technique || 'Classic'}
      </div>
    </div>
  `).join('');
}

function updateStats() {
  document.getElementById('totalCount').textContent = recipes.length;
  document.getElementById('cuisineCount').textContent = new Set(recipes.map(r => r.cuisine)).size;
}

function buildCuisineFilter() {
  const list = [...new Set(recipes.map(r => r.cuisine))].sort();
  document.getElementById('filterCuisine').innerHTML = '<option value="">All Cuisines</option>' + list.map(c => `<option value="${c}">${c}</option>`).join('');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(recipes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `chef_alejandro_legacy_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importJSON() { document.getElementById('importFile').click(); }
function loadImport(e) {
  const reader = new FileReader();
  reader.onload = ev => { recipes = JSON.parse(ev.target.result); save(); render(); alert("Legacy archive updated!"); };
  reader.readAsText(e.target.files[0]);
}

window.onload = () => { updateStats(); buildCuisineFilter(); render(); };
</script>
</body>
</html>
