<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Alejandro — Recipe Portfolio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');

  :root {
    --cream: #fdf6ec;
    --dark: #1a1008;
    --brown: #4a2c0a;
    --gold: #c8922a;
    --light-gold: #f0d08a;
    --red: #8b1a1a;
    --gray: #6b6b6b;
    --card-bg: #fffdf8;
    --border: #e8d5b0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--brown);
    color: var(--cream);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    border-bottom: 4px solid var(--gold);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    letter-spacing: 0.02em;
  }

  header h1 span { color: var(--light-gold); font-style: italic; }

  header p {
    font-size: 0.85rem;
    opacity: 0.75;
    margin-top: 0.4rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* STATS BAR */
  .stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    padding: 0.8rem 1rem;
    background: var(--dark);
    color: var(--light-gold);
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    flex-wrap: wrap;
  }

  .stats span strong { color: var(--gold); }

  /* SEARCH */
  .search-bar {
    padding: 1.2rem 1rem;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .search-row {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .search-bar input, .search-bar select {
    flex: 1;
    min-width: 140px;
    padding: 0.6rem 0.9rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    background: white;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus, .search-bar select:focus {
    border-color: var(--gold);
  }

  .btn {
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { background: var(--brown); }

  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--gray);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  /* ADD RECIPE FORM */
  .add-form {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    margin: 1rem;
    display: none;
  }
  .add-form.visible { display: block; }

  .add-form h3 {
    font-family: 'Playfair Display', serif;
    color: var(--brown);
    margin-bottom: 1rem;
    font-size: 1.1rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 0.6rem;
  }

  @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

  .form-grid input, .form-grid select,
  .add-form textarea, .add-form input {
    width: 100%;
    padding: 0.5rem 0.8rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    color: var(--dark);
    background: var(--cream);
  }

  .add-form textarea { width: 100%; min-height: 80px; resize: vertical; margin-bottom: 0.6rem; }

  .form-label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.2rem;
    display: block;
  }

  .form-field { margin-bottom: 0.6rem; }

  /* RECIPE GRID */
  .container { padding: 1rem; max-width: 1200px; margin: 0 auto; }
  .results-info { font-size: 0.8rem; color: var(--gray); margin-bottom: 0.8rem; padding: 0 0.2rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }

  /* RECIPE CARD */
  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
    cursor: pointer;
  }
  .card:hover { box-shadow: 0 6px 20px rgba(74,44,10,0.15); transform: translateY(-2px); }

  .card-header {
    background: var(--brown);
    color: var(--cream);
    padding: 0.8rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .card-header h3 { font-family: 'Playfair Display', serif; font-size: 1rem; line-height: 1.3; flex: 1; }

  .cuisine-badge {
    background: var(--gold);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.2rem 0.5rem;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .card-body { padding: 0.9rem 1rem; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.7rem; }
  .tag { background: var(--cream); border: 1px solid var(--border); color: var(--gray); font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; }
  .tag.technique { border-color: var(--gold); color: var(--brown); }

  .card-ingredient { font-size: 0.8rem; color: var(--gray); margin-bottom: 0.6rem; }
  .card-ingredient strong { color: var(--brown); }
  .card-preview { font-size: 0.82rem; color: var(--dark); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .card-footer { padding: 0.6rem 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: var(--gray); }
  .difficulty { font-weight: 700; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px; }
  .difficulty.Basic { background: #e8f5e9; color: #2e7d32; }
  .difficulty.Intermediate { background: #fff8e1; color: #f57f17; }
  .difficulty.Advanced { background: #fce4ec; color: #c62828; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,16,8,0.7);
    z-index: 1000;
    padding: 1rem;
    overflow-y: auto;
  }
  .modal-overlay.visible { display: flex; align-items: flex-start; justify-content: center; }

  .modal {
    background: var(--card-bg);
    border-radius: 12px;
    max-width: 680px;
    width: 100%;
    margin: auto;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .modal-header {
    background: var(--brown);
    color: var(--cream);
    padding: 1.2rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .modal-header h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; line-height: 1.3; flex: 1; }

  .close-btn { background: none; border: none; color: var(--cream); font-size: 1.5rem; cursor: pointer; padding: 0 0.3rem; opacity: 0.7; transition: opacity 0.2s; }
  .close-btn:hover { opacity: 1; }

  .modal-body { padding: 1.5rem; }
  .modal-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }

  .modal-section { margin-bottom: 1.2rem; }
  .modal-section h4 { font-family: 'Playfair Display', serif; color: var(--brown); font-size: 1rem; margin-bottom: 0.5rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }
  .modal-section p, .modal-section li { font-size: 0.88rem; line-height: 1.7; color: var(--dark); }
  .modal-section ul, .modal-section ol { padding-left: 1.2rem; }

  .notes-box { background: #fffbf0; border: 1.5px solid var(--light-gold); border-radius: 8px; padding: 1rem; font-size: 0.85rem; font-style: italic; color: var(--brown); line-height: 1.6; }

  .modal-actions {
    display: flex;
    gap: 1rem;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .delete-btn {
    background: var(--red);
    color: white;
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    flex: 1;
  }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--gray); }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--brown); }

  /* PRINT OPTIMIZATION */
  @media print {
    body { background: white; color: black; }
    .search-bar, .stats, header, .btn, .delete-btn, .close-btn, .results-info, .modal-overlay { 
      display: none !important; 
    }
    .modal-overlay.visible { display: block; position: static; padding: 0; background: none; }
    .modal { 
      box-shadow: none; 
      max-width: 100%; 
      border: none; 
      position: absolute; 
      top: 0; 
      left: 0; 
    }
    .modal-header { background: black !important; color: white !important; -webkit-print-color-adjust: exact; }
    .cuisine-badge { border: 1px solid black; color: black; background: none; }
    .notes-box { border: 1px solid #ccc; background: #fff !important; }
    .modal-actions { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>Chef <span>Alejandro</span> — Recipe Portfolio</h1>
  <p>Royal Caribbean · Omni Grove Park Inn · Guatemala</p>
</header>

<div class="stats" id="statsBar">
  <span>📚 <strong id="totalCount">0</strong> Recipes</span>
  <span>🌍 <strong id="cuisineCount">0</strong> Cuisines</span>
  <span>🍳 <strong id="techniqueCount">0</strong> Techniques</span>
</div>

<div class="search-bar">
  <div class="search-row">
    <input type="text" id="searchName" placeholder="🔍 Search by recipe name...">
    <input type="text" id="searchIngredient" placeholder="🥩 Search by ingredient...">
    <select id="filterCuisine">
      <option value="">All Cuisines</option>
    </select>
    <button class="btn btn-outline" onclick="clearSearch()">Clear</button>
  </div>
  <div class="search-row">
    <button class="btn btn-gold" onclick="toggleAddForm()">＋ Add Recipe</button>
    <button class="btn btn-outline" onclick="exportJSON()">⬇ Export</button>
    <button class="btn btn-outline" onclick="importJSON()">⬆ Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="loadImport(event)">
  </div>
</div>

<div class="add-form" id="addForm">
  <h3>📝 Add New Recipe</h3>
  <div class="form-grid">
    <div class="form-field"><label class="form-label">Recipe Name *</label><input type="text" id="f_name"></div>
    <div class="form-field"><label class="form-label">Cuisine *</label><input type="text" id="f_cuisine"></div>
    <div class="form-field"><label class="form-label">Category</label><input type="text" id="f_category"></div>
    <div class="form-field">
      <label class="form-label">Difficulty</label>
      <select id="f_difficulty"><option>Basic</option><option>Intermediate</option><option>Advanced</option></select>
    </div>
    <div class="form-field"><label class="form-label">Key Ingredient *</label><input type="text" id="f_ingredient"></div>
    <div class="form-field"><label class="form-label">Technique</label><input type="text" id="f_technique"></div>
    <div class="form-field"><label class="form-label">Yield</label><input type="text" id="f_yield"></div>
    <div class="form-field"><label class="form-label">Time</label><input type="text" id="f_time"></div>
  </div>
  <div class="form-field"><label class="form-label">Ingredients</label><textarea id="f_ingredients"></textarea></div>
  <div class="form-field"><label class="form-label">Method</label><textarea id="f_method"></textarea></div>
  <div class="form-field"><label class="form-label">Chef Notes</label><textarea id="f_notes"></textarea></div>
  <div class="form-field"><label class="form-label">Alejandro's Notes</label><textarea id="f_personal"></textarea></div>
  <div class="form-field"><label class="form-label">Pairing</label><input type="text" id="f_pairing"></div>
  <button class="btn btn-gold" onclick="saveRecipe()">Save Recipe</button>
  <button class="btn btn-outline" onclick="toggleAddForm()">Cancel</button>
</div>

<div class="container">
  <div class="results-info" id="resultsInfo"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h2 id="m_name"></h2>
      <button class="close-btn" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta" id="m_meta"></div>
      <div class="modal-section">
        <h4>🥩 Ingredients</h4>
        <ul id="m_ingredients"></ul>
      </div>
      <div class="modal-section">
        <h4>👨‍🍳 Method</h4>
        <ol id="m_method"></ol>
      </div>
      <div class="modal-section" id="m_notes_section">
        <h4>💡 Chef Notes</h4>
        <p id="m_notes"></p>
      </div>
      <div class="modal-section" id="m_personal_section">
        <h4>📓 Alejandro's Notes</h4>
        <div class="notes-box" id="m_personal"></div>
      </div>
      <div class="modal-section" id="m_pairing_section">
        <h4>🍷 Pairing</h4>
        <p id="m_pairing"></p>
      </div>
      <div class="modal-actions">
        <button class="btn btn-gold" style="flex:2" onclick="window.print()">🖨️ Print for Kitchen</button>
        <button class="delete-btn" id="m_delete">🗑 Remove</button>
      </div>
    </div>
  </div>
</div>

<script>
let recipes = [];

function load() {
  const saved = localStorage.getItem('chef_alejandro_recipes');
  if (saved) recipes = JSON.parse(saved);
  render();
  updateStats();
  buildCuisineFilter();
}

function save() {
  localStorage.setItem('chef_alejandro_recipes', JSON.stringify(recipes));
}

function render() {
  const name = document.getElementById('searchName').value.toLowerCase();
  const ingredient = document.getElementById('searchIngredient').value.toLowerCase();
  const cuisine = document.getElementById('filterCuisine').value.toLowerCase();

  let filtered = recipes.filter(r => {
    return (!name || r.name.toLowerCase().includes(name)) &&
           (!ingredient || r.ingredient.toLowerCase().includes(ingredient)) &&
           (!cuisine || r.cuisine.toLowerCase() === cuisine);
  });

  const grid = document.getElementById('grid');
  document.getElementById('resultsInfo').textContent = `${filtered.length} recipes found`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><h3>No recipes found.</h3></div>';
    return;
  }

  grid.innerHTML = filtered.map(r => `
    <div class="card" onclick="openModal('${r.id}')">
      <div class="card-header"><h3>${r.name}</h3><span class="cuisine-badge">${r.cuisine}</span></div>
      <div class="card-body">
        <div class="card-meta">${r.technique ? `<span class="tag technique">${r.technique}</span>` : ''}</div>
        <div class="card-preview">${r.method.substring(0,100)}...</div>
      </div>
    </div>
  `).join('');
}

function updateStats() {
  document.getElementById('totalCount').textContent = recipes.length;
  document.getElementById('cuisineCount').textContent = new Set(recipes.map(r => r.cuisine)).size;
  document.getElementById('techniqueCount').textContent = new Set(recipes.map(r => r.technique).filter(Boolean)).size;
}

function buildCuisineFilter() {
  const sel = document.getElementById('filterCuisine');
  const cuisines = [...new Set(recipes.map(r => r.cuisine))].sort();
  sel.innerHTML = '<option value="">All Cuisines</option>' + cuisines.map(c => `<option value="${c.toLowerCase()}">${c}</option>`).join('');
}

function toggleAddForm() { document.getElementById('addForm').classList.toggle('visible'); }

function saveRecipe() {
  const r = {
    id: Date.now().toString(),
    name: document.getElementById('f_name').value,
    cuisine: document.getElementById('f_cuisine').value,
    category: document.getElementById('f_category').value,
    difficulty: document.getElementById('f_difficulty').value,
    ingredient: document.getElementById('f_ingredient').value,
    technique: document.getElementById('f_technique').value,
    yield: document.getElementById('f_yield').value,
    time: document.getElementById('f_time').value,
    ingredients: document.getElementById('f_ingredients').value,
    method: document.getElementById('f_method').value,
    notes: document.getElementById('f_notes').value,
    personal: document.getElementById('f_personal').value,
    pairing: document.getElementById('f_pairing').value,
    date: new Date().toLocaleDateString()
  };
  if (!r.name || !r.cuisine) return alert('Name and Cuisine required');
  recipes.unshift(r);
  save();
  toggleAddForm();
  render();
  updateStats();
  buildCuisineFilter();
}

function openModal(id) {
  const r = recipes.find(r => r.id === id);
  document.getElementById('m_name').textContent = r.name;
  document.getElementById('m_meta').innerHTML = `<span class="cuisine-badge">${r.cuisine}</span><span class="tag">${r.difficulty}</span>`;
  document.getElementById('m_ingredients').innerHTML = r.ingredients.split('\n').map(i => `<li>${i}</li>`).join('');
  document.getElementById('m_method').innerHTML = r.method.split('\n').map(s => `<li>${s}</li>`).join('');
  document.getElementById('m_personal').textContent = r.personal;
  document.getElementById('m_delete').onclick = () => { if(confirm('Delete?')){ recipes=recipes.filter(x=>x.id!==id); save(); closeModalDirect(); render(); updateStats(); }};
  document.getElementById('modal').classList.add('visible');
}

function closeModal(e) { if (e.target.id === 'modal') closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('visible'); }

function clearSearch() {
  document.getElementById('searchName').value = '';
  document.getElementById('searchIngredient').value = '';
  document.getElementById('filterCuisine').value = '';
  render();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(recipes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'chef_alejandro_portfolio.json';
  a.click();
}

function importJSON() { document.getElementById('importFile').click(); }
function loadImport(e) {
  const reader = new FileReader();
  reader.onload = ev => { recipes = JSON.parse(ev.target.result); save(); load(); };
  reader.readAsText(e.target.files[0]);
}

document.getElementById('searchName').addEventListener('input', render);
document.getElementById('searchIngredient').addEventListener('input', render);
document.getElementById('filterCuisine').addEventListener('change', render);

load();
</script>
</body>
</html>
