<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Alejandro — Recipe Portfolio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');

  :root {
    --cream: #fdf6ec;
    --dark: #1a1008;
    --brown: #4a2c0a;
    --gold: #c8922a;
    --light-gold: #f0d08a;
    --red: #8b1a1a;
    --gray: #6b6b6b;
    --card-bg: #fffdf8;
    --border: #e8d5b0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--brown);
    color: var(--cream);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    border-bottom: 4px solid var(--gold);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    letter-spacing: 0.02em;
  }

  header h1 span { color: var(--light-gold); font-style: italic; }

  header p {
    font-size: 0.85rem;
    opacity: 0.75;
    margin-top: 0.4rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* STATS BAR */
  .stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    padding: 0.8rem 1rem;
    background: var(--dark);
    color: var(--light-gold);
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    flex-wrap: wrap;
  }

  .stats span strong { color: var(--gold); }

  /* SEARCH */
  .search-bar {
    padding: 1.2rem 1rem;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .search-row {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .search-bar input, .search-bar select {
    flex: 1;
    min-width: 140px;
    padding: 0.6rem 0.9rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    background: white;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus, .search-bar select:focus {
    border-color: var(--gold);
  }

  .btn {
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .btn-gold {
    background: var(--gold);
    color: white;
  }

  .btn-gold:hover { background: var(--brown); }

  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--gray);
  }

  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  /* ADD RECIPE FORM */
  .add-form {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    margin: 1rem;
    display: none;
  }

  .add-form.visible { display: block; }

  .add-form h3 {
    font-family: 'Playfair Display', serif;
    color: var(--brown);
    margin-bottom: 1rem;
    font-size: 1.1rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 0.6rem;
  }

  @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

  .form-grid input, .form-grid select,
  .add-form textarea, .add-form input {
    width: 100%;
    padding: 0.5rem 0.8rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    color: var(--dark);
    background: var(--cream);
  }

  .add-form textarea {
    width: 100%;
    min-height: 80px;
    resize: vertical;
    margin-bottom: 0.6rem;
  }

  .form-label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.2rem;
    display: block;
  }

  .form-field { margin-bottom: 0.6rem; }

  /* RECIPE GRID */
  .container {
    padding: 1rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .results-info {
    font-size: 0.8rem;
    color: var(--gray);
    margin-bottom: 0.8rem;
    padding: 0 0.2rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  /* RECIPE CARD */
  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .card:hover {
    box-shadow: 0 6px 20px rgba(74,44,10,0.15);
    transform: translateY(-2px);
  }

  .card-header {
    background: var(--brown);
    color: var(--cream);
    padding: 0.8rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
  }

  .card-header h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    line-height: 1.3;
    flex: 1;
  }

  .cuisine-badge {
    background: var(--gold);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.2rem 0.5rem;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .card-body { padding: 0.9rem 1rem; }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 0.7rem;
  }

  .tag {
    background: var(--cream);
    border: 1px solid var(--border);
    color: var(--gray);
    font-size: 0.7rem;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
  }

  .tag.technique { border-color: var(--gold); color: var(--brown); }

  .card-ingredient {
    font-size: 0.8rem;
    color: var(--gray);
    margin-bottom: 0.6rem;
  }

  .card-ingredient strong { color: var(--brown); }

  .card-preview {
    font-size: 0.82rem;
    color: var(--dark);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    padding: 0.6rem 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    color: var(--gray);
  }

  .difficulty {
    font-weight: 700;
    font-size: 0.7rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
  }

  .difficulty.Basic { background: #e8f5e9; color: #2e7d32; }
  .difficulty.Intermediate { background: #fff8e1; color: #f57f17; }
  .difficulty.Advanced { background: #fce4ec; color: #c62828; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,16,8,0.7);
    z-index: 1000;
    padding: 1rem;
    overflow-y: auto;
  }

  .modal-overlay.visible { display: flex; align-items: flex-start; justify-content: center; }

  .modal {
    background: var(--card-bg);
    border-radius: 12px;
    max-width: 680px;
    width: 100%;
    margin: auto;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .modal-header {
    background: var(--brown);
    color: var(--cream);
    padding: 1.2rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .modal-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    line-height: 1.3;
    flex: 1;
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--cream);
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0 0.3rem;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .close-btn:hover { opacity: 1; }

  .modal-body { padding: 1.5rem; }

  .modal-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .modal-section { margin-bottom: 1.2rem; }

  .modal-section h4 {
    font-family: 'Playfair Display', serif;
    color: var(--brown);
    font-size: 1rem;
    margin-bottom: 0.5rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border);
  }

  .modal-section p, .modal-section li {
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--dark);
  }

  .modal-section ul, .modal-section ol {
    padding-left: 1.2rem;
  }

  .notes-box {
    background: #fffbf0;
    border: 1.5px solid var(--light-gold);
    border-radius: 8px;
    padding: 1rem;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--brown);
    line-height: 1.6;
  }

  .delete-btn {
    background: var(--red);
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    margin-top: 1rem;
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--gray);
  }

  .empty-state h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    margin-bottom: 0.5rem;
    color: var(--brown);
  }

  .empty-state p { font-size: 0.9rem; }

  @media print {
    .search-bar, .stats, .btn, header p { display: none; }
    .card { break-inside: avoid; }
  }
  <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
    <button class="btn btn-gold" onclick="window.print()" style="flex: 1;">🖨️ Print Technical Sheet</button>
    <button class="delete-btn" id="m_delete" style="flex: 1; margin-top: 0;">🗑 Remove from Portfolio</button>
</div>
</style>
</head>
<body>

<header>
  <h1>Chef <span>Alejandro</span> — Recipe Portfolio</h1>
  <p>Royal Caribbean · Omni Grove Park Inn · Guatemala</p>
</header>

<div class="stats" id="statsBar">
  <span>📚 <strong id="totalCount">0</strong> Recipes</span>
  <span>🌍 <strong id="cuisineCount">0</strong> Cuisines</span>
  <span>🍳 <strong id="techniqueCount">0</strong> Techniques</span>
</div>

<div class="search-bar">
  <div class="search-row">
    <input type="text" id="searchName" placeholder="🔍 Search by recipe name...">
    <input type="text" id="searchIngredient" placeholder="🥩 Search by ingredient...">
    <select id="filterCuisine">
      <option value="">All Cuisines</option>
    </select>
    <button class="btn btn-outline" onclick="clearSearch()">Clear</button>
  </div>
  <div class="search-row">
    <button class="btn btn-gold" onclick="toggleAddForm()">＋ Add Recipe</button>
    <button class="btn btn-outline" onclick="exportJSON()">⬇ Export</button>
    <button class="btn btn-outline" onclick="importJSON()">⬆ Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="loadImport(event)">
  </div>
</div>

<!-- ADD RECIPE FORM -->
<div class="add-form" id="addForm">
  <h3>📝 Add New Recipe</h3>
  <div class="form-grid">
    <div class="form-field">
      <label class="form-label">Recipe Name *</label>
      <input type="text" id="f_name" placeholder="e.g. Boeuf Bourguignon">
    </div>
    <div class="form-field">
      <label class="form-label">Cuisine *</label>
      <input type="text" id="f_cuisine" placeholder="e.g. French">
    </div>
    <div class="form-field">
      <label class="form-label">Category</label>
      <input type="text" id="f_category" placeholder="e.g. Main / Sauce / Dessert">
    </div>
    <div class="form-field">
      <label class="form-label">Difficulty</label>
      <select id="f_difficulty">
        <option>Basic</option>
        <option>Intermediate</option>
        <option>Advanced</option>
      </select>
    </div>
    <div class="form-field">
      <label class="form-label">Key Ingredient *</label>
      <input type="text" id="f_ingredient" placeholder="e.g. beef, chicken, eggs">
    </div>
    <div class="form-field">
      <label class="form-label">Technique</label>
      <input type="text" id="f_technique" placeholder="e.g. Braising">
    </div>
    <div class="form-field">
      <label class="form-label">Yield</label>
      <input type="text" id="f_yield" placeholder="e.g. 4 portions">
    </div>
    <div class="form-field">
      <label class="form-label">Prep + Cook Time</label>
      <input type="text" id="f_time" placeholder="e.g. 30 min prep / 2 hrs cook">
    </div>
  </div>
  <div class="form-field">
    <label class="form-label">Ingredients (one per line)</label>
    <textarea id="f_ingredients" placeholder="500g beef chuck&#10;2 bottles red wine&#10;200g lardons"></textarea>
  </div>
  <div class="form-field">
    <label class="form-label">Method (numbered steps)</label>
    <textarea id="f_method" placeholder="1. Season beef generously with salt and pepper...&#10;2. Sear in batches until deeply browned..."></textarea>
  </div>
  <div class="form-field">
    <label class="form-label">Chef Notes & Pro Tips</label>
    <textarea id="f_notes" placeholder="Pro tip: Don't skip the sear — this is where flavor is built..."></textarea>
  </div>
  <div class="form-field">
    <label class="form-label">Alejandro's Personal Notes</label>
    <textarea id="f_personal" placeholder="My memories, personal variations, how I've made this at Royal Caribbean or Omni Grove..."></textarea>
  </div>
  <div class="form-field">
    <label class="form-label">Wine / Cocktail Pairing</label>
    <input type="text" id="f_pairing" placeholder="e.g. Burgundy Pinot Noir / Old Fashioned">
  </div>
  <button class="btn btn-gold" onclick="saveRecipe()">Save Recipe to Portfolio</button>
  <button class="btn btn-outline" style="margin-left:0.5rem" onclick="toggleAddForm()">Cancel</button>
</div>

<!-- RECIPE GRID -->
<div class="container">
  <div class="results-info" id="resultsInfo"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h2 id="m_name"></h2>
      <button class="close-btn" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta" id="m_meta"></div>
      <div class="modal-section">
        <h4>🥩 Ingredients</h4>
        <ul id="m_ingredients"></ul>
      </div>
      <div class="modal-section">
        <h4>👨‍🍳 Method</h4>
        <ol id="m_method"></ol>
      </div>
      <div class="modal-section" id="m_notes_section">
        <h4>💡 Chef Notes</h4>
        <p id="m_notes"></p>
      </div>
      <div class="modal-section" id="m_personal_section">
        <h4>📓 Alejandro's Notes</h4>
        <div class="notes-box" id="m_personal"></div>
      </div>
      <div class="modal-section" id="m_pairing_section">
        <h4>🍷 Pairing</h4>
        <p id="m_pairing"></p>
      </div>
      <button class="delete-btn" id="m_delete">🗑 Remove from Portfolio</button>
    </div>
  </div>
</div>

<script>
let recipes = [];
let editingId = null;

// LOAD from localStorage
function load() {
  const saved = localStorage.getItem('chef_alejandro_recipes');
  if (saved) recipes = JSON.parse(saved);
  render();
  updateStats();
  buildCuisineFilter();
}

function save() {
  localStorage.setItem('chef_alejandro_recipes', JSON.stringify(recipes));
}

// RENDER
function render() {
  const name = document.getElementById('searchName').value.toLowerCase();
  const ingredient = document.getElementById('searchIngredient').value.toLowerCase();
  const cuisine = document.getElementById('filterCuisine').value.toLowerCase();

  let filtered = recipes.filter(r => {
    const matchName = !name || r.name.toLowerCase().includes(name);
    const matchIng = !ingredient || r.ingredient.toLowerCase().includes(ingredient);
    const matchCuisine = !cuisine || r.cuisine.toLowerCase() === cuisine;
    return matchName && matchIng && matchCuisine;
  });

  const grid = document.getElementById('grid');
  const info = document.getElementById('resultsInfo');

  info.textContent = filtered.length === recipes.length
    ? `${recipes.length} recipe${recipes.length !== 1 ? 's' : ''} in your portfolio`
    : `${filtered.length} of ${recipes.length} recipes match your search`;

  if (filtered.length === 0 && recipes.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <h3>Your portfolio is empty</h3>
      <p>Click <strong>+ Add Recipe</strong> to start building your culinary library.<br>
      Or use <strong>Import</strong> to load a saved portfolio.</p>
    </div>`;
    return;
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <h3>No recipes found</h3>
      <p>Try a different name or ingredient.</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(r => `
    <div class="card" onclick="openModal('${r.id}')">
      <div class="card-header">
        <h3>${r.name}</h3>
        <span class="cuisine-badge">${r.cuisine}</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          ${r.category ? `<span class="tag">${r.category}</span>` : ''}
          ${r.technique ? `<span class="tag technique">${r.technique}</span>` : ''}
          ${r.time ? `<span class="tag">⏱ ${r.time}</span>` : ''}
        </div>
        <div class="card-ingredient">
          <strong>Key ingredient:</strong> ${r.ingredient}
        </div>
        <div class="card-preview">${r.method ? r.method.split('\n')[0] : ''}</div>
      </div>
      <div class="card-footer">
        <span class="difficulty ${r.difficulty}">${r.difficulty}</span>
        ${r.pairing ? `<span>🍷 ${r.pairing.substring(0,30)}${r.pairing.length>30?'…':''}</span>` : ''}
      </div>
    </div>
  `).join('');
}

// STATS
function updateStats() {
  document.getElementById('totalCount').textContent = recipes.length;
  const cuisines = new Set(recipes.map(r => r.cuisine)).size;
  const techniques = new Set(recipes.map(r => r.technique).filter(Boolean)).size;
  document.getElementById('cuisineCount').textContent = cuisines;
  document.getElementById('techniqueCount').textContent = techniques;
}

function buildCuisineFilter() {
  const sel = document.getElementById('filterCuisine');
  const cuisines = [...new Set(recipes.map(r => r.cuisine))].sort();
  const current = sel.value;
  sel.innerHTML = '<option value="">All Cuisines</option>' +
    cuisines.map(c => `<option value="${c.toLowerCase()}" ${c.toLowerCase()===current?'selected':''}>${c}</option>`).join('');
}

// SEARCH
document.getElementById('searchName').addEventListener('input', render);
document.getElementById('searchIngredient').addEventListener('input', render);
document.getElementById('filterCuisine').addEventListener('change', render);

function clearSearch() {
  document.getElementById('searchName').value = '';
  document.getElementById('searchIngredient').value = '';
  document.getElementById('filterCuisine').value = '';
  render();
}

// FORM
function toggleAddForm() {
  const f = document.getElementById('addForm');
  f.classList.toggle('visible');
  if (f.classList.contains('visible')) {
    document.getElementById('f_name').focus();
  }
}

function saveRecipe() {
  const name = document.getElementById('f_name').value.trim();
  const cuisine = document.getElementById('f_cuisine').value.trim();
  const ingredient = document.getElementById('f_ingredient').value.trim();
  if (!name || !cuisine || !ingredient) {
    alert('Please fill in Recipe Name, Cuisine, and Key Ingredient.');
    return;
  }
  const recipe = {
    id: Date.now().toString(),
    name,
    cuisine,
    category: document.getElementById('f_category').value.trim(),
    difficulty: document.getElementById('f_difficulty').value,
    ingredient,
    technique: document.getElementById('f_technique').value.trim(),
    yield: document.getElementById('f_yield').value.trim(),
    time: document.getElementById('f_time').value.trim(),
    ingredients: document.getElementById('f_ingredients').value.trim(),
    method: document.getElementById('f_method').value.trim(),
    notes: document.getElementById('f_notes').value.trim(),
    personal: document.getElementById('f_personal').value.trim(),
    pairing: document.getElementById('f_pairing').value.trim(),
    date: new Date().toLocaleDateString()
  };
  recipes.unshift(recipe);
  save();
  clearForm();
  toggleAddForm();
  render();
  updateStats();
  buildCuisineFilter();
}

function clearForm() {
  ['f_name','f_cuisine','f_category','f_ingredient','f_technique',
   'f_yield','f_time','f_ingredients','f_method','f_notes','f_personal','f_pairing']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_difficulty').value = 'Basic';
}

// MODAL
function openModal(id) {
  const r = recipes.find(r => r.id === id);
  if (!r) return;

  document.getElementById('m_name').textContent = r.name;

  document.getElementById('m_meta').innerHTML = `
    <span class="cuisine-badge">${r.cuisine}</span>
    ${r.category ? `<span class="tag">${r.category}</span>` : ''}
    <span class="difficulty ${r.difficulty}">${r.difficulty}</span>
    ${r.technique ? `<span class="tag technique">${r.technique}</span>` : ''}
    ${r.yield ? `<span class="tag">Yield: ${r.yield}</span>` : ''}
    ${r.time ? `<span class="tag">⏱ ${r.time}</span>` : ''}
    <span class="tag">Added: ${r.date}</span>
  `;

  const ingList = document.getElementById('m_ingredients');
  ingList.innerHTML = r.ingredients
    ? r.ingredients.split('\n').filter(Boolean).map(i => `<li>${i}</li>`).join('')
    : '<li>No ingredients listed</li>';

  const// Enhanced Method Rendering
const methList = document.getElementById('m_method');
methList.innerHTML = r.method
  ? r.method.split('\n')
      .filter(Boolean)
      .map(s => `<li><span class="step-number"></span>${s.replace(/^\d+\.\s*/,'')}</li>`)
      .join('')
  : '<li>Manual technique not specified.</li>';

  const notesSection = document.getElementById('m_notes_section');
  notesSection.style.display = r.notes ? 'block' : 'none';
  document.getElementById('m_notes').textContent = r.notes;

  const personalSection = document.getElementById('m_personal_section');
  personalSection.style.display = r.personal ? 'block' : 'none';
  document.getElementById('m_personal').textContent = r.personal;

  const pairingSection = document.getElementById('m_pairing_section');
  pairingSection.style.display = r.pairing ? 'block' : 'none';
  document.getElementById('m_pairing').textContent = r.pairing;

  document.getElementById('m_delete').onclick = () => deleteRecipe(id);
  document.getElementById('modal').classList.add('visible');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal').classList.remove('visible');
}

function deleteRecipe(id) {
  if (!confirm('Remove this recipe from your portfolio?')) return;
  recipes = recipes.filter(r => r.id !== id);
  save();
  closeModalDirect();
  render();
  updateStats();
  buildCuisineFilter();
}

// EXPORT / IMPORT
function exportJSON() {
  const blob = new Blob([JSON.stringify(recipes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'chef_alejandro_portfolio.json';
  a.click();
}

function importJSON() {
  document.getElementById('importFile').click();
}

function loadImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error();
      recipes = [...imported, ...recipes];
      save();
      render();
      updateStats();
      buildCuisineFilter();
      alert(`✅ Imported ${imported.length} recipes!`);
    } catch {
      alert('❌ Invalid file. Please use a previously exported portfolio JSON file.');
    }
  };
  reader.readAsText(file);
}

// INIT
load();
</script>
</body>
</html>
